<!-- Storage polyfill for standalone -->
<script>
// Simple storage using localStorage
window.storage = {
  get: (key) => {
    try {
      const v = localStorage.getItem(key);
      return v ? Promise.resolve({ key, value: v }) : Promise.reject(new Error("not found"));
    } catch(e) { return Promise.reject(e); }
  },
  set: (key, value) => {
    try {
      localStorage.setItem(key, value);
      return Promise.resolve({ key, value });
    } catch(e) { return Promise.reject(e); }
  },
  delete: (key) => {
    try {
      localStorage.removeItem(key);
      return Promise.resolve({ key, deleted: true });
    } catch(e) { return Promise.reject(e); }
  }
};
</script>

/* ── Canvas logo: removes white bg ── */
const useLogo = (b64, makeWhite = false) => {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.onload = () => {
      canvas.width  = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      const d  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const px = d.data;
      for (let i = 0; i < px.length; i += 4) {
        if (px[i] > 200 && px[i+1] > 200 && px[i+2] > 200) {
          px[i+3] = 0;
        } else if (makeWhite) {
          px[i] = px[i+1] = px[i+2] = 255;
        }
      }
      ctx.putImageData(d, 0, 0);
    };
    img.src = `data:image/png;base64,${b64}`;
  }, []);
  return ref;
};

const Field = ({ label, type = "text", value, onChange, placeholder, dark }) => {
  const [f, sf] = useState(false);
  const tc = dark ? "#1D1D1B" : C.cream;
  const bc = dark ? (f ? "#1D1D1B" : "rgba(29,29,27,0.3)") : (f ? C.cream : C.dim);
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontFamily:"Rubik", fontSize:10, fontWeight:600, letterSpacing:2,
        textTransform:"uppercase", color: dark?"rgba(29,29,27,0.5)":C.muted, marginBottom:8 }}>{label}</div>
      <input type={type} value={value} placeholder={placeholder}
        onChange={e => onChange(e.target.value)}
        onFocus={() => sf(true)} onBlur={() => sf(false)}
        style={{ width:"100%", background:"transparent", border:"none",
          borderBottom:`1px solid ${bc}`, padding:"10px 0",
          fontSize:16, color:tc, fontFamily:"Rubik", fontWeight:400,
          outline:"none", transition:"border-color .2s", caretColor:C.sol }} />
    </div>
  );
};

const Btn = ({ children, onClick, disabled, filled, ghost, style }) => {
  const [h, sh] = useState(false);
  let bg, border, color, radius = "99px";
  if (filled)  { bg = h ? "#1a1a1a" : "#1D1D1B"; border = "none"; color = "#fff"; }
  else if (ghost) { bg = "transparent"; border = "1.5px solid rgba(29,29,27,0.25)"; color = "#1D1D1B"; }
  else         { bg = h ? "rgba(245,239,224,0.12)":"transparent"; border=`1px solid ${C.dim}`; color=C.cream; }
  if (disabled){ bg = "rgba(245,239,224,0.05)"; border=`1px solid rgba(245,239,224,0.1)`; color="rgba(245,239,224,0.2)"; }
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => sh(true)} onMouseLeave={() => sh(false)}
      style={{ width:"100%", padding:"16px 24px", border, background:bg, color,
        cursor:disabled?"not-allowed":"pointer", fontFamily:"Rubik",
        fontSize:14, fontWeight:500, letterSpacing:1, transition:"all .2s",
        borderRadius:radius, marginBottom:10, ...style }}>
      {children}
    </button>
  );
};

      fetch("/api/get-config").then(function(res) {
        if (!res.ok) return;
        return res.json();
      }).then(function(serverCfg) {
        if (!serverCfg || Object.keys(serverCfg).length === 0) return;
        var merged = Object.assign({}, DEF, serverCfg);
        setCfg(merged); setCfgF(merged);
        try { var h=merged.heroBanner||""; var rest=Object.assign({},merged); delete rest.heroBanner; localStorage.setItem("qp_s", JSON.stringify(rest)); if(h) localStorage.setItem("qp_banner",h); } catch(e) {}
      }).catch(function(e) { console.warn("loadCfg server:", e); });
    })();
  }, []);

  const saveR = async d => { try { await window.storage.set("qp_r", JSON.stringify(d)); } catch(e) {} };
  const saveS = async d => {
    try {
      var heroBanner = d.heroBanner || "";
      var rest = Object.assign({}, d);
      delete rest.heroBanner;
      await fetch("/api/save-config", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(Object.assign({}, rest, {heroBanner: heroBanner})) });
      try { localStorage.setItem("qp_s", JSON.stringify(rest)); if(heroBanner) localStorage.setItem("qp_banner", heroBanner); else localStorage.removeItem("qp_banner"); } catch(e) {}
    } catch(e) { console.warn("saveS:", e); throw e; }
  };

  // Precios dinámicos desde config — siempre frescos desde cfg
  const precio        = Number(cfg.precio) > 0 ? Number(cfg.precio) : 15000;
  const serviceCharge = Number(cfg.serviceCharge) > 0 ? Number(cfg.serviceCharge) / 100 : 0.12;

  const ocp  = reservas.filter(r=>r.status!=="cancelado").reduce((s,r)=>s+r.cantidad,0);
  const lib  = Math.max(0, cfg.cupo - ocp);
  const conf = reservas.filter(r=>r.status==="confirmado");
  const pend = reservas.filter(r=>r.status==="pendiente");
  const rec  = conf.reduce((s,r)=>s+r.total,0);
  const filt = filter==="todas" ? reservas : reservas.filter(r=>r.status===filter);

  const go     = v => { setView(v); window.scrollTo(0,0); };

  const submit = () => {

    if (!form.tel.trim()) return setFormErr("El WhatsApp es obligatorio.");
    if (form.qty > lib) return setFormErr("No hay suficiente cupo disponible.");

  const analyzeComprobante = async (base64img) => {
    setAiStatus("loading");
    setAiMsg("");
    try {
      const pendingData = {
        id: genId(),
        nombre: form.nombre.trim(),
        email: form.email.trim(),
        telefono: form.tel.trim(),
        cantidad: form.qty,
        total: totalTransfer,
        status: "pendiente",
        createdAt: new Date().toLocaleString("es-AR"),
        metodoPago: "transferencia",
      };

      const res = await fetch("/api/verify-comprobante", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imagen: base64img, montoEsperado: totalTransfer })
      });

      const result = await res.json();
      if (!res.ok) throw new Error(result.error || "Error al verificar");

      if (!result.esComprobante) {
        setAiStatus("error");
        setAiMsg("La imagen no parece ser un comprobante de transferencia.");
        return;
      }

      const montoOk = result.monto && Math.abs(result.monto - totalTransfer) < 10;
      const confianzaAlta = result.confianza >= 90 && montoOk;

      const status = confianzaAlta ? "confirmado" : "pendiente";
      pendingData.status = status;
      pendingData.aiConfianza = result.confianza;

      setPending(pendingData);
      const u = [...reservas, pendingData];
      setReservas(u);
      await saveR(u);

      if (confianzaAlta) {
        // Auto-confirmar con alta confianza: enviar email
        try {
          await emailjs.send("service_w7isuyl", "template_fzm4grk", {
            to_email:   pendingData.email,
            nombre:     pendingData.nombre,
            reserva_id: pendingData.id,
            cantidad:   pendingData.cantidad + " entrada" + (pendingData.cantidad > 1 ? "s" : ""),
            total:      fmt(pendingData.total),
          });
        } catch(e) { console.warn("Email:", e); }
        setAiStatus("ok");
      } else {
        // Pendiente: NO enviar email, esperar aprobación manual del admin
        setAiStatus("pending");
        setAiMsg(result.motivo || "Tu comprobante quedó pendiente de revisión. Te avisamos cuando se confirme.");

      setAiStatus("error");

        style={{ border:"1px solid rgba(245,239,224,.1)",borderRadius:12,padding:"15px 17px",marginBottom:9,cursor:"pointer",background:"rgba(245,239,224,.03)" }}>

          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div style={{ fontFamily:"Rubik",fontSize:11,color:C.cream,letterSpacing:.5,fontVariantNumeric:"tabular-nums" }}>{BANK.cvu}</div>
            <button onClick={()=>copyText(BANK.cvu,"cvu")} style={{ background:copied==="cvu"?"rgba(46,204,113,.15)":"rgba(245,239,224,.06)",border:`1px solid ${copied==="cvu"?C.success:C.dim}`,color:copied==="cvu"?C.success:C.cream,cursor:"pointer",fontFamily:"Rubik",fontSize:10,fontWeight:600,letterSpacing:1.5,padding:"6px 14px",borderRadius:99,flexShrink:0,marginLeft:8 }}>
              {copied==="cvu"?"✓ Copiado":"Copiar"}
            </button>
          </div>
        </div>
      </div>
      <HR />
      <div style={{ marginBottom:18 }}>
        <div style={{ fontFamily:"Rubik",fontSize:8,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:10 }}>Subí tu comprobante</div>
        <div style={{ fontFamily:"Rubik",fontSize:12,fontWeight:300,color:C.muted,marginBottom:12,lineHeight:1.6 }}>Subí el comprobante y lo verificamos con IA automáticamente.</div>
        <label style={{ display:"block",cursor:"pointer" }}>
          <input type="file" accept="image/*" style={{ display:"none" }} onChange={async e=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{setComprobante(ev.target.result.split(",")[1]);setAiStatus("idle");};reader.readAsDataURL(file);}} />
          <div style={{ border:`1.5px dashed ${comprobante?C.sol:C.dim}`,borderRadius:10,padding:"20px",textAlign:"center",background:comprobante?"rgba(204,154,30,.05)":"transparent" }}>
            {comprobante?(
              <div><img src={`data:image/jpeg;base64,${comprobante}`} style={{ maxWidth:"100%",maxHeight:140,objectFit:"contain",borderRadius:4,marginBottom:8 }}/><div style={{ fontFamily:"Rubik",fontSize:11,color:C.sol }}>✓ Tocá para cambiar</div></div>
            ):(
              <div><div style={{ fontSize:24,marginBottom:6 }}>📄</div><div style={{ fontFamily:"Rubik",fontSize:12,color:C.muted }}>Tocá para subir comprobante</div><div style={{ fontFamily:"Rubik",fontSize:10,color:"rgba(245,239,224,.25)",marginTop:3 }}>JPG o PNG</div></div>
            )}
          </div>
        </label>
      </div>
      {aiStatus==="loading"&&<div style={{ padding:"11px 14px",background:"rgba(0,158,227,.08)",border:"1px solid rgba(0,158,227,.2)",borderRadius:8,marginBottom:10,textAlign:"center" }}><div style={{ fontFamily:"Rubik",fontSize:12,color:"#009EE3" }}>🔍 Verificando con IA...</div></div>}
      {aiStatus==="ok"&&<div style={{ padding:"11px 14px",background:"rgba(46,204,113,.1)",border:`1px solid ${C.success}`,borderRadius:8,marginBottom:10 }}><div style={{ fontFamily:"Rubik",fontSize:12,color:C.success,fontWeight:600 }}>✓ Pago verificado</div><div style={{ fontFamily:"Rubik",fontSize:11,color:C.muted,marginTop:3 }}>Te enviamos la confirmación por email.</div></div>}
      {aiStatus==="pending"&&<div style={{ padding:"11px 14px",background:"rgba(243,156,18,.1)",border:`1px solid ${C.pending}`,borderRadius:8,marginBottom:10 }}><div style={{ fontFamily:"Rubik",fontSize:12,color:C.pending,fontWeight:600 }}>⏳ Pago en revisión</div><div style={{ fontFamily:"Rubik",fontSize:11,color:C.muted,marginTop:3 }}>{aiMsg}</div></div>}
      {aiStatus==="error"&&<div style={{ padding:"11px 14px",background:"rgba(231,76,60,.1)",border:`1px solid ${C.danger}`,borderRadius:8,marginBottom:10 }}><div style={{ fontFamily:"Rubik",fontSize:12,color:C.danger }}>{aiMsg}</div></div>}
      {aiStatus==="ok"||aiStatus==="pending"?(
        <Btn onClick={()=>go("success")}>Ver mi reserva →</Btn>
      ):(
        <Btn onClick={()=>analyzeComprobante(comprobante)} disabled={!comprobante||aiStatus==="loading"}>
          {aiStatus==="loading"?"Verificando...":"Verificar comprobante"}
        </Btn>
      )}
    </PayShell>
  );

  /* ════ PAYMENT ════ */
  if (view==="payment") return (
    <PayShell onBack={()=>go("choose-payment")} cfg={cfg} heroB64={HERO_B64}>
      <div style={{ marginBottom:22 }}>
        <div style={{ fontFamily:"Rubik",fontSize:8,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:4 }}>Total a abonar</div>
        <div style={{ fontFamily:"Rubik",fontSize:46,fontWeight:200,color:C.sol,lineHeight:1 }}>${fmt(pending?.total)}</div>
        <div style={{ fontFamily:"Rubik",fontSize:12,color:C.muted,marginTop:5 }}>{pending?.cantidad} entrada{pending?.cantidad>1?"s":""} · {pending?.nombre}</div>
      </div>
      <HR />
      <div style={{ marginBottom:22 }}>
        {[["01","Tocá el botón para abrir el pago"],["02","Completá el pago en MercadoPago"],["03","Serás redirigido automáticamente"]].map(([n,t])=>(
          <div key={n} style={{ display:"flex",gap:14,marginBottom:12,alignItems:"flex-start" }}>
            <span style={{ fontFamily:"Rubik",fontSize:9,fontWeight:600,color:C.sol,minWidth:20 }}>{n}</span>
            <span style={{ fontFamily:"Rubik",fontSize:13,fontWeight:300,color:C.cream,lineHeight:1.6 }}>{t}</span>
          </div>
        ))}
      </div>
      {mpError&&<div style={{ padding:"10px 14px",background:"rgba(231,76,60,.1)",border:"1px solid rgba(231,76,60,.3)",borderRadius:8,marginBottom:10 }}><span style={{ fontFamily:"Rubik",fontSize:12,color:C.danger }}>{mpError}</span></div>}
      <button onClick={async()=>{setMpLoading(true);setMpError("");try{const r=await fetch(`${BACKEND_URL}/api/create-preference`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nombre:pending&&pending.nombre,email:pending&&pending.email,telefono:pending&&pending.telefono,cantidad:pending&&pending.cantidad,total:pending&&pending.total})});const data=await r.json();if(!r.ok)throw new Error(data.error||"Error al crear el pago");await window.storage.set("qp_p",JSON.stringify(pending)).catch(function(e){});window.location.href=data.init_point;}catch(e){setMpError("No se pudo conectar con MercadoPago. Intentá de nuevo.");}finally{setMpLoading(false);}}}
        disabled={mpLoading}
        style={{ width:"100%",padding:"16px 20px",background:mpLoading?"rgba(0,158,227,.5)":"#009EE3",color:"#fff",border:"none",textAlign:"center",fontFamily:"Rubik",fontSize:13,fontWeight:600,letterSpacing:2,textTransform:"uppercase",cursor:mpLoading?"not-allowed":"pointer",borderRadius:"99px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:10 }}>
        {mpLoading?"Conectando…":"Pagar con MercadoPago"}
      </button>
    </PayShell>
  );

  /* ════ SUCCESS ════ */
  if (view==="success") return (
    <div style={{ ...base, justifyContent:"center" }}>
      <style>{GF}</style>
      <div style={{ ...inner, textAlign:"center" }}>
        <LogoWhite w={140} style={{ margin:"0 auto 44px" }} />
        <div style={{ fontFamily:"Rubik", fontSize:11, fontWeight:600, color:C.success, textTransform:"uppercase", letterSpacing:3, marginBottom:8 }}>Reserva recibida</div>
        <p style={{ fontFamily:"Rubik", fontSize:14, fontWeight:300, color:C.muted, lineHeight:1.8, margin:"12px 0 32px" }}>
          Tu pago está siendo verificado.<br/>Te confirmamos por WhatsApp o email.
        </p>
        <div style={{ textAlign:"left", marginBottom:24 }}>
          <Row label="Nombre"   value={pending?.nombre} />
          <Row label="Email"    value={pending?.email} />
          <Row label="Entradas" value={`${pending?.cantidad} persona${pending?.cantidad>1?"s":""}`} />
          <Row label="Total"    value={`$${fmt(pending?.total)}`} accent />
        </div>
        <div style={{ fontFamily:"Rubik", fontSize:10, color:C.muted, letterSpacing:2, marginBottom:32 }}>
          Reserva <span style={{ color:C.sol, letterSpacing:3 }}>#{pending?.id}</span>
        </div>
        <Btn onClick={goHome}>Volver al inicio</Btn>
      </div>
    </div>
  );

  /* ════ ADMIN LOGIN ════ */
  if (view==="admin-login") return (
    <PayShell onBack={goHome} cfg={cfg} heroB64={HERO_B64}>
      <div style={{ textAlign:"center",marginBottom:32 }}>
        <LogoWhite w={100} style={{ margin:"0 auto 16px",opacity:.9 }} />
        <div style={{ fontFamily:"Rubik",fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:3 }}>Panel de administración</div>
      </div>
      <Field label="Usuario" value={lf.u} onChange={v=>setLf(f=>({...f,u:v}))} placeholder="admin" />
      <Field label="Contraseña" type="password" value={lf.p} onChange={v=>setLf(f=>({...f,p:v}))} placeholder="••••••••" />
      {lerr&&<div style={{ fontFamily:"Rubik",fontSize:12,color:C.danger,marginBottom:12,padding:"10px 14px",background:"rgba(231,76,60,.1)",borderLeft:`3px solid ${C.danger}` }}>Credenciales incorrectas.</div>}
      <Btn onClick={doLogin} style={{ marginTop:16 }}>Ingresar</Btn>
    </PayShell>
  );

  /* ════ ADMIN ════ */
  if (view==="admin") return (
    <div style={{ ...base, paddingTop:40 }}>
      <style>{GF}</style>
      <div style={{ width:"100%", maxWidth:600 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:44 }}>
          <div>
            <LogoWhite w={100} style={{ marginBottom:6 }} />
            <div style={{ fontFamily:"Rubik", fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:2 }}>Administración</div>
          </div>
          <button onClick={goHome} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:11, fontFamily:"Rubik", letterSpacing:2, textTransform:"uppercase" }}>Salir</button>
        </div>

        {/* Stats grid */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:1, background:C.creamDim, marginBottom:40 }}>
          {[[conf.length,"Confirmadas",C.success],[pend.length,"Pendientes",C.pending],[lib,"Cupo libre",C.cream],[`$${fmt(rec)}`,"Recaudado",C.sol]].map(([v,l,c],i)=>(
            <div key={i} style={{ padding:"18px 14px", background:C.vino }}>
              <div style={{ fontFamily:"Rubik", fontSize:typeof v==="string"?16:30, fontWeight:200, color:c, lineHeight:1 }}>{v}</div>
              <div style={{ fontFamily:"Rubik", fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:1.5, marginTop:5 }}>{l}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", gap:24, marginBottom:28, borderBottom:`1px solid ${C.creamDim}` }}>
          {[["reservas","Reservas"],["config","Configuración"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{ background:"none", border:"none",
              borderBottom:`1px solid ${tab===k?C.sol:"transparent"}`, paddingBottom:10,
              cursor:"pointer", fontFamily:"Rubik", fontSize:11, fontWeight:tab===k?600:400,
              color:tab===k?C.cream:C.muted, letterSpacing:2, textTransform:"uppercase", marginBottom:-1 }}>{l}</button>
          ))}
          {tab==="reservas" && (
            <button onClick={()=>{
              const h=["ID","Nombre","Email","WhatsApp","Personas","Total","Estado","Fecha"];
              const rows=reservas.map(r=>[r.id,r.nombre,r.email,r.telefono,r.cantidad,r.total,r.status,r.createdAt]);
              const csv=[h,...rows].map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
              const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
              const url=URL.createObjectURL(blob);
              Object.assign(document.createElement("a"),{href:url,download:"reservas_quepena.csv"}).click();
              URL.revokeObjectURL(url);
            }} style={{ marginLeft:"auto", background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:10, fontFamily:"Rubik", letterSpacing:2, textTransform:"uppercase", paddingBottom:10 }}>↓ CSV</button>
          )}
        </div>

        {/* Reservas */}
        {tab==="reservas" && (
          <>
            <div style={{ display:"flex", gap:20, marginBottom:20 }}>
              {[["todas","Todas"],["pendiente","Pend."],["confirmado","Conf."],["cancelado","Canc."]].map(([v,l])=>(
                <button key={v} onClick={()=>setFilter(v)} style={{ background:"none", border:"none",
                  cursor:"pointer", fontFamily:"Rubik", fontSize:10, fontWeight:filter===v?600:400,
                  color:filter===v?C.cream:C.muted, letterSpacing:1.5, textTransform:"uppercase",
                  padding:0, borderBottom:`1px solid ${filter===v?C.cream:"transparent"}`, paddingBottom:2 }}>{l}</button>
              ))}
            </div>
            {filt.length===0
              ? <div style={{ fontFamily:"Rubik", fontSize:13, color:C.muted, padding:"32px 0", fontStyle:"italic" }}>No hay reservas aún.</div>
              : filt.map(r => {
                const sc={pendiente:C.pending, confirmado:C.success, cancelado:C.danger};
                return (
                  <div key={r.id} style={{ borderBottom:`1px solid ${C.creamDim}`, padding:"14px 0" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:5 }}>
                      <div>
                        <div style={{ fontFamily:"Rubik", fontSize:15, fontWeight:500, color:C.cream }}>{r.nombre}</div>
                        <div style={{ fontFamily:"Rubik", fontSize:12, fontWeight:300, color:C.muted, marginTop:2 }}>{r.email} · {r.telefono}</div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontFamily:"Rubik", fontSize:9, color:sc[r.status], textTransform:"uppercase", letterSpacing:1.5 }}>{r.status}</span>
                        {r.status!=="confirmado"&&<button onClick={()=>chgSt(r.id,"confirmado")} style={{ width:26,height:26,background:`rgba(46,204,113,.1)`,border:`1px solid ${C.success}`,color:C.success,cursor:"pointer",fontSize:12,borderRadius:2 }}>✓</button>}
                        {r.status!=="cancelado"&&<button  onClick={()=>chgSt(r.id,"cancelado")}  style={{ width:26,height:26,background:`rgba(231,76,60,.1)`, border:`1px solid ${C.danger}`, color:C.danger, cursor:"pointer",fontSize:12,borderRadius:2 }}>✗</button>}
                        {r.status==="cancelado"&&<button  onClick={()=>chgSt(r.id,"pendiente")} style={{ width:26,height:26,background:`rgba(243,156,18,.1)`,border:`1px solid ${C.pending}`,color:C.pending,cursor:"pointer",fontSize:12,borderRadius:2 }}>↩</button>}
                      </div>
                    </div>
                    <span style={{ fontFamily:"Rubik", fontSize:13, fontWeight:300, color:C.muted }}>
                      {r.cantidad} persona{r.cantidad>1?"s":""} · <span style={{ color:C.sol }}>${fmt(r.total)}</span>
                    </span>
                  </div>
                );
              })}
          </>
        )}

        {/* Config */}
        {tab==="config" && (
          <div>
            {/* Evento */}
            <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.sol,textTransform:"uppercase",letterSpacing:2,marginBottom:16,marginTop:4 }}>Evento</div>
            {[
              ["Nombre del evento","text",cfgF.eventoNombre,v=>setCfgF(f=>({...f,eventoNombre:v})),"La Guitarreada"],
              ["Fecha completa","text",cfgF.eventoFecha,v=>setCfgF(f=>({...f,eventoFecha:v})),"Sábado 18 de Abril · 2026"],
              ["Día (para el banner)","text",cfgF.eventoDia,v=>setCfgF(f=>({...f,eventoDia:v})),"Sábado"],
              ["Fecha corta (para el banner)","text",cfgF.eventoFechaCorta,v=>setCfgF(f=>({...f,eventoFechaCorta:v})),"18.04"],
              ["Hora","text",cfgF.eventoHora,v=>setCfgF(f=>({...f,eventoHora:v})),"22hs"],
              ["Lugar","text",cfgF.eventoLugar,v=>setCfgF(f=>({...f,eventoLugar:v})),"La Casona de Güemes"],
              ["Barrio / Ciudad","text",cfgF.eventoBarrio,v=>setCfgF(f=>({...f,eventoBarrio:v})),"Güemes · Córdoba Capital"],
            ].map(([label,type,val,setter,ph])=>(
              <div key={label} style={{ marginBottom:18 }}>
                <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:6 }}>{label}</div>
                <input type={type} value={val||""} onChange={e=>setter(e.target.value)} placeholder={ph}
                  style={{ width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.dim}`,
                    padding:"10px 0",fontSize:14,color:C.cream,fontFamily:"Rubik",outline:"none" }} />
              </div>
            ))}

            <HR my={20}/>

            {/* Precios */}
            <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.sol,textTransform:"uppercase",letterSpacing:2,marginBottom:16 }}>Precios</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:18 }}>
              <div>
                <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:6 }}>Precio base ($)</div>
                <input type="number" value={cfgF.precio||""} onChange={e=>setCfgF(f=>({...f,precio:Number(e.target.value)}))}
                  placeholder="15000"
                  style={{ width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.dim}`,
                    padding:"10px 0",fontSize:18,color:C.sol,fontFamily:"Rubik",outline:"none",fontWeight:300 }} />
              </div>
              <div>
                <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:6 }}>Service charge (%)</div>
                <input type="number" value={cfgF.serviceCharge||""} onChange={e=>setCfgF(f=>({...f,serviceCharge:Number(e.target.value)}))}
                  placeholder="12"
                  style={{ width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.dim}`,
                    padding:"10px 0",fontSize:18,color:C.cream,fontFamily:"Rubik",outline:"none",fontWeight:300 }} />
              </div>
            </div>
            <div style={{ fontFamily:"Rubik",fontSize:11,color:C.muted,marginBottom:4 }}>
              Con MP: <span style={{color:C.cream}}>${new Intl.NumberFormat("es-AR").format(Math.round((cfgF.precio||0)*(1+(cfgF.serviceCharge||12)/100)))}</span>
              &nbsp;·&nbsp; Transferencia: <span style={{color:C.sol}}>${new Intl.NumberFormat("es-AR").format(cfgF.precio||0)}</span>
            </div>
            <div style={{ fontFamily:"Rubik",fontSize:11,color:C.muted,marginBottom:18 }}>Cupo: <span style={{color:C.cream}}>{ocp} ocupados · {lib} libres</span></div>
            <div style={{ marginBottom:18 }}>
              <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:6 }}>Cupo máximo</div>
              <input type="number" value={cfgF.cupo||""} onChange={e=>setCfgF(f=>({...f,cupo:Number(e.target.value)}))}
                style={{ width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.dim}`,
                  padding:"10px 0",fontSize:14,color:C.cream,fontFamily:"Rubik",outline:"none" }} />
            </div>

            <HR my={20}/>

            {/* Banner */}
            <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.sol,textTransform:"uppercase",letterSpacing:2,marginBottom:16 }}>Banner de portada</div>
            <label style={{ display:"block", cursor:"pointer", marginBottom:18 }}>
              <input type="file" accept="image/*" style={{ display:"none" }}
                onChange={e => {
                  const file = e.target.files?.[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = ev => {
                    const b64 = ev.target.result.split(",")[1];
                    setCfgF(f => ({...f, heroBanner: b64}));
                  };
                  reader.readAsDataURL(file);
                }} />
              <div style={{ border:`1.5px dashed ${cfgF.heroBanner?C.sol:C.dim}`, borderRadius:8, padding:"20px", textAlign:"center", background:cfgF.heroBanner?"rgba(204,154,30,0.05)":"transparent" }}>
                {cfgF.heroBanner
                  ? <div>
                      <img src={`data:image/jpeg;base64,${cfgF.heroBanner}`} style={{ maxWidth:"100%", maxHeight:120, objectFit:"cover", borderRadius:4, marginBottom:8 }} />
                      <div style={{ fontFamily:"Rubik",fontSize:12,color:C.sol }}>✓ Banner personalizado · tocá para cambiar</div>
                    </div>
                  : <div>
                      <div style={{ fontSize:24, marginBottom:6 }}>🖼</div>
                      <div style={{ fontFamily:"Rubik",fontSize:13,color:C.muted }}>Subir foto de portada</div>
                      <div style={{ fontFamily:"Rubik",fontSize:11,color:"rgba(245,239,224,0.25)",marginTop:4 }}>JPG o PNG · se ajusta automáticamente</div>
                    </div>
                }
              </div>
            </label>
            {cfgF.heroBanner && (
              <button onClick={()=>setCfgF(f=>({...f,heroBanner:""}))}
                style={{ background:"none",border:`1px solid ${C.danger}`,color:C.danger,cursor:"pointer",
                  fontFamily:"Rubik",fontSize:11,letterSpacing:2,textTransform:"uppercase",
                  padding:"8px 16px",borderRadius:99,marginBottom:18,width:"100%" }}>
                Restaurar foto original
              </button>
            )}

            <HR my={20}/>

            {/* Acceso admin */}
            <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.sol,textTransform:"uppercase",letterSpacing:2,marginBottom:16 }}>Acceso admin</div>
            {[
              ["Usuario","text",cfgF.adminUser,v=>setCfgF(f=>({...f,adminUser:v}))],
              ["Contraseña","password",cfgF.adminPass,v=>setCfgF(f=>({...f,adminPass:v}))],
            ].map(([label,type,val,setter])=>(
              <div key={label} style={{ marginBottom:18 }}>
                <div style={{ fontFamily:"Rubik",fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:6 }}>{label}</div>
                <input type={type} value={val||""} onChange={e=>setter(e.target.value)}
                  style={{ width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.dim}`,
                    padding:"10px 0",fontSize:14,color:C.cream,fontFamily:"Rubik",outline:"none" }} />
              </div>
            ))}

            <HR my={20}/>
            <Btn onClick={saveCfg} style={cfgOk?{color:C.success,borderColor:C.success}:{}}>{cfgOk?"Guardado ✓":"Guardar cambios"}</Btn>
          </div>
        )}
      </div>
    </div>
  );
  return null;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
